name: MERN CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install backend
        run: |
          cd backend
          npm install

      - name: Install frontend
        run: |
          cd frontend
          npm install